<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Detail</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/formats.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Pokemon Showdown Battle Statistics</h1>
            <p id="period-info">Loading latest stats...</p>
        </header>

        <div id="pokemon-detail" class="pokemon-detail">
            <div class="pokemon-detail-header">
                <div class="pokemon-detail-identity">
                    <img id="pokemon-sprite" class="pokemon-detail-sprite" alt="" loading="lazy">
                    <div>
                        <div class="pokemon-name-row">
                            <h2 id="pokemon-name">Loading...</h2>
                            <div id="pokemon-types" class="pokemon-types-row" aria-label="Pokemon types"></div>
                        </div>
                        <p id="pokemon-usage"></p>
                        <p id="pokemon-ranking"></p>
                    </div>
                </div>
                <div class="pokemon-detail-actions">
                    <div class="pokemon-picker-switch">
                        <div class="pokemon-picker-input-wrap">
                            <input id="pokemon-picker-select" type="text" aria-label="Search or select pokemon" placeholder="Search Pokemon" autocomplete="off" role="combobox" aria-expanded="false" aria-controls="pokemon-picker-menu">
                            <div id="pokemon-picker-menu" class="pokemon-picker-menu" role="listbox" aria-label="Pokemon options"></div>
                        </div>
                    </div>
                    <div class="pokemon-rating-switch">
                        <div id="pokemon-rating-filter" class="pokemon-rating-segments" role="group" aria-label="Select rating"></div>
                    </div>
                    <div class="pokemon-format-switch">
                        <select id="pokemon-format-select" aria-label="Select format"></select>
                    </div>
                    <a id="back-to-format" class="back-link" href="./">Back to formats</a>
                </div>
            </div>

            <div id="pokemon-detail-grid" class="pokemon-detail-grid"></div>
        </div>

        <div id="pokemon-error" class="error" style="display: none;"></div>

        <footer>
            Data from <a href="https://www.smogon.com/stats" target="_blank">Smogon Stats</a>
        </footer>
    </div>

    <script src="../theme.js"></script>
    <script src="pokemon.js"></script>
</body>
</html>
